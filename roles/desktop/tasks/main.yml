---
- name: Create wallpapers directory.
  file:
    path: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
    state: directory

- name: Synchronize wallpapers directory
  synchronize:
    src: wallpapers/
    dest: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}/"
    delete: yes
    recursive: yes
  when: ansible_connection == "local"

- name: Copy wallpapers (for remote hosts)
  copy:
    src: "{{ item }}"
    dest: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
  with_fileglob:
    - wallpapers/*
  when: ansible_connection != "local"

- name: Get list of wallpapers
  find:
    paths: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
    patterns: "*.png"
  register: wallpaper_files

- name: Set per-space wallpapers alphabetically
  vars:
    sorted_wallpapers: "{{ wallpaper_files.files | sort(attribute='path') | map(attribute='path') | list }}"
    space_key_codes: [18, 19, 20, 21, 23, 22, 26, 28, 25, 29, 12, 13, 14, 15, 17, 16]
  shell: |
    osascript {% for wp in sorted_wallpapers %} \
      -e 'tell application "System Events" to key code {{ space_key_codes[loop.index0] }} using {control down}' \
      -e 'delay 2' \
      -e 'tell application "Finder" to set desktop picture to POSIX file "{{ wp }}"' \
      -e 'delay 0.5' \
    {% endfor %} \
      -e 'tell application "System Events" to key code 18 using {control down}'
  changed_when: false
  when: wallpaper_files.files | length > 0

- name: Remove superfluous from dock
  shell: /usr/local/bin/dockutil --remove '{{ item }}' | cat
  ignore_errors: true
  with_items:
    - Mail
    - TV
    - News
    - Music
    - Podcasts
    - Calendar
    - Launchpad
    - Contacts
    - Maps
    - Photos
    - Messages
    - FaceTime
    - Notes
    - Reminders
    - App Store
    - System Preferences

- name: print role name
  set_fact:
    parent_role_name: "{{ role_name }}"

- name: add version
  include_role:
    name: version
