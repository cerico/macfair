---
- name: Create wallpapers directory.
  file:
    path: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
    state: directory

- name: Synchronize wallpapers directory
  synchronize:
    src: wallpapers/
    dest: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}/"
    delete: yes
    recursive: yes
  when: ansible_connection == "local"

- name: Copy wallpapers (for remote hosts)
  copy:
    src: "{{ item }}"
    dest: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
  with_fileglob:
    - wallpapers/*
  when: ansible_connection != "local"

- name: Get list of wallpapers
  find:
    paths: "{{ ['~' + macbook_user.stdout, 'wallpapers'] | path_join }}"
    patterns: "*.png"
  register: wallpaper_files

- name: Set per-space wallpapers alphabetically
  vars:
    sorted_wallpapers: "{{ wallpaper_files.files | sort(attribute='path') | map(attribute='path') | list }}"
    space_key_codes: [18, 19, 20, 21, 23, 22, 26, 28, 25, 29, 12, 13, 14, 15, 17, 16]
  shell: |
    osascript {% for wp in sorted_wallpapers %} \
      -e 'tell application "System Events" to key code {{ space_key_codes[loop.index0] }} using {control down}' \
      -e 'delay 2' \
      -e 'tell application "Finder" to set desktop picture to POSIX file "{{ wp }}"' \
      -e 'delay 0.5' \
    {% endfor %} \
      -e 'tell application "System Events" to key code 18 using {control down}'
  changed_when: false
  when: wallpaper_files.files | length > 0

- name: Create Karabiner config directory
  file:
    path: "{{ [ansible_env.HOME, '.config', 'karabiner'] | path_join }}"
    state: directory
  tags: karabiner

- name: Copy Karabiner config
  copy:
    src: karabiner/karabiner.json
    dest: "{{ [ansible_env.HOME, '.config', 'karabiner', 'karabiner.json'] | path_join }}"
    force: yes
  tags: karabiner

- name: Generate KM16 infographic
  ansible.builtin.command:
    cmd: python3 files/km16/generate.py
    chdir: "{{ playbook_dir }}"
  tags: karabiner

- name: Zen requires manual steps
  debug:
    msg:
      - "1. about:config → toolkit.legacyUserProfileCustomizations.stylesheets = true"
      - "2. Install Transparent Zen mod from zen-browser.app/mods"
      - "3. about:config → browser.tabs.allow_transparent_browser = true"
  tags: zen

- name: Find Zen Browser default profile
  find:
    paths: "{{ ['~' + macbook_user.stdout, 'Library', 'Application Support', 'zen', 'Profiles'] | path_join }}"
    file_type: directory
    patterns: "*.default*"
  register: zen_profiles
  ignore_errors: true
  tags: zen

- name: Clone Catppuccin Zen Browser theme
  git:
    repo: https://github.com/catppuccin/zen-browser.git
    dest: "{{ ['~' + macbook_user.stdout, '.cache', 'catppuccin-zen-browser'] | path_join }}"
    version: main
    depth: 1
    force: true
  when: zen_profiles.files is defined and zen_profiles.files | length > 0
  tags: zen

- name: Create Zen chrome directory
  file:
    path: "{{ [zen_profiles.files[0].path, 'chrome'] | path_join }}"
    state: directory
  when: zen_profiles.files is defined and zen_profiles.files | length > 0
  tags: zen

- name: Install Catppuccin Mocha theme for Zen
  copy:
    src: "{{ item }}"
    dest: "{{ [zen_profiles.files[0].path, 'chrome', item | basename] | path_join }}"
    remote_src: true
  with_fileglob:
    - "{{ ['~' + macbook_user.stdout, '.cache', 'catppuccin-zen-browser', 'themes', 'Mocha', 'Lavender', '*'] | path_join }}"
  when: zen_profiles.files is defined and zen_profiles.files | length > 0
  tags: zen

- name: Remove superfluous from dock
  shell: /usr/local/bin/dockutil --remove '{{ item }}' | cat
  ignore_errors: true
  with_items:
    - Mail
    - TV
    - News
    - Music
    - Podcasts
    - Calendar
    - Launchpad
    - Contacts
    - Maps
    - Photos
    - Messages
    - FaceTime
    - Notes
    - Reminders
    - App Store
    - System Preferences

- name: Get space UUIDs for app bindings
  script: files/get_space_uuids.swift
  args:
    executable: swift
  register: space_uuids_raw
  changed_when: false
  failed_when: space_uuids_raw.rc != 0
  when: desktop_app_bindings is defined and desktop_app_bindings | length > 0

- name: Build app-bindings dict
  set_fact:
    app_bindings_dict: >-
      {{ app_bindings_dict | default({}) | combine({
        item.bundle_id: (space_uuids_raw.stdout | from_json)[item.desktop | string]
      }) }}
  loop: "{{ desktop_app_bindings }}"
  when: desktop_app_bindings is defined and (space_uuids_raw.stdout | from_json)[item.desktop | string] is defined

- name: Write app-bindings plist
  copy:
    content: "{{ app_bindings_dict | to_nice_json }}"
    dest: "{{ ['/tmp', 'app-bindings.json'] | path_join }}"
    mode: "0644"
  when: app_bindings_dict is defined and app_bindings_dict | length > 0

- name: Apply app-bindings to defaults
  script: "files/apply_app_bindings.py {{ ['/tmp', 'app-bindings.json'] | path_join }}"
  args:
    executable: python3
  register: apply_result
  changed_when: "'changed' in apply_result.stdout"
  when: app_bindings_dict is defined and app_bindings_dict | length > 0
  notify: restart dock

- name: print role name
  set_fact:
    parent_role_name: "{{ role_name }}"

- name: add version
  include_role:
    name: version
