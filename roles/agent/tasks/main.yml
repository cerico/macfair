---
- name: Setup agent infrastructure
  when: hostvars[inventory_hostname].optional is defined and "agent" in hostvars[inventory_hostname].optional
  block:
    - name: Install podman and podman-compose
      apt:
        name:
          - podman
          - podman-compose
        state: present
      become: true

    - name: Enable lingering for deploy user
      command: "loginctl enable-linger {{ ansible_user }}"
      become: true
      changed_when: false

    - name: Create agent directory
      file:
        path: "{{ agent_deploy_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0750'

    - name: Configure git identity for agent
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: user.name, value: "{{ agent_git_name }}" }
        - { name: user.email, value: "{{ agent_git_email }}" }

    - name: Create .ssh directory for agent
      file:
        path: "{{ ['/home', ansible_user, '.ssh'] | path_join }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Deploy agent SSH key for GitHub
      copy:
        content: "{{ vault_agent_ssh_key }}"
        dest: "{{ ['/home', ansible_user, '.ssh', 'id_ed25519'] | path_join }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      when: vault_agent_ssh_key is defined

    - name: Add GitHub to known_hosts
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"
        path: "{{ ['/home', ansible_user, '.ssh', 'known_hosts'] | path_join }}"
        state: present

    - name: Reset container SSH ownership for idempotent runs
      command: podman unshare chown -R 0:0 "{{ [agent_deploy_dir, '.ssh'] | path_join }}"
      failed_when: false
      changed_when: false

    - name: Create container SSH directory
      file:
        path: "{{ [agent_deploy_dir, '.ssh'] | path_join }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy SSH key for container # 0644 intentional: rootless podman UID remapping prevents container reading 0600 files
      copy:
        content: "{{ vault_agent_ssh_key }}"
        dest: "{{ [agent_deploy_dir, '.ssh', 'id_ed25519'] | path_join }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      when: vault_agent_ssh_key is defined
      notify: Restart claude-agent

    - name: Copy known_hosts for container
      copy:
        src: "{{ ['/home', ansible_user, '.ssh', 'known_hosts'] | path_join }}"
        dest: "{{ [agent_deploy_dir, '.ssh', 'known_hosts'] | path_join }}"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      notify: Restart claude-agent

    - name: Template compose override for SSH mount
      template:
        src: compose.override.yml.j2
        dest: "{{ [agent_deploy_dir, 'compose.override.yml'] | path_join }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0640'
      notify: Restart claude-agent

    - name: Template .env file
      template:
        src: env.j2
        dest: "{{ [agent_deploy_dir, '.env'] | path_join }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      notify: Restart claude-agent

    - name: Create systemd user directory
      file:
        path: "{{ ['/home', ansible_user, '.config', 'systemd', 'user'] | path_join }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Template claude-agent systemd service
      template:
        src: claude-agent.service.j2
        dest: "{{ ['/home', ansible_user, '.config', 'systemd', 'user', 'claude-agent.service'] | path_join }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      notify: Restart claude-agent

    - name: Enable and start claude-agent systemd service
      ansible.builtin.systemd:
        name: claude-agent
        enabled: true
        state: started
        scope: user
        daemon_reload: true
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_user_uid }}"

    - name: Copy agent nginx config
      template:
        src: agent.nginx.conf.j2
        dest: "{{ ['/etc/nginx/conf.d', agent_domain + '.conf'] | path_join }}"
      become: true
      notify: Reload nginx

    - name: Ensure nginx config is valid
      command: nginx -t
      become: true
      changed_when: false

    - name: Flush handlers before certbot
      meta: flush_handlers

    - name: Obtain SSL certificate for agent
      shell: "/snap/bin/certbot --nginx -n --agree-tos --email {{ agent_certbot_email }} -d {{ agent_domain }}"
      become: true
      register: certbot_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_result.stdout"
