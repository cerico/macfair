---
- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded
  become: true

- name: Build claude-agent image
  shell: podman-compose build
  args:
    chdir: "{{ agent_deploy_dir }}"
  register: agent_build
  listen: Restart claude-agent

- name: Systemd restart claude-agent
  ansible.builtin.systemd:
    name: claude-agent
    state: restarted
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_user_uid }}"
  when: agent_build is succeeded
  listen: Restart claude-agent
