---
- name: Create second brain vault directories
  file:
    path: "{{ ['~' + macbook_user.stdout, 'second-brain', item] | path_join }}"
    state: directory
  loop:
    - Inbox
    - Projects
    - Areas
    - Resources
    - Archive
    - Zettelkasten
    - Literature
    - MOCs
    - Daily
    - Templates

- name: Copy speak script
  ansible.builtin.copy:
    src: bin/speak
    dest: /usr/local/bin/speak
    mode: '0755'
  become: true

- name: Copy readurl script
  ansible.builtin.copy:
    src: bin/readurl
    dest: /usr/local/bin/readurl
    mode: '0755'
  become: true

- name: Copy whisper wrapper script
  ansible.builtin.copy:
    src: bin/whisper_wrapper
    dest: /usr/local/bin/whisper_wrapper
    mode: '0755'
  become: true

- name: Copy macropad action script
  ansible.builtin.copy:
    src: bin/macropad_action
    dest: /usr/local/bin/macropad_action
    mode: '0755'
  become: true

- name: Create whisper cues directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, '.local', 'share', 'whisper_cues'] | path_join }}"
    state: directory
  when: inventory_hostname != 'github-runner.localhost'

- name: Generate whisper audio cues
  ansible.builtin.shell: >
    say -v Tessa -o "$HOME/.local/share/whisper_cues/{{ item }}.aiff" "{{ item }}"
  args:
    creates: "{{ ['~' + macbook_user.stdout, '.local', 'share', 'whisper_cues', item + '.aiff'] | path_join }}"
  loop:
    - listening
    - transcribing
    - done
    - starting
  when: inventory_hostname != 'github-runner.localhost'

- name: Clone kickstart.nvim
  ansible.builtin.git:
    repo: https://github.com/nvim-lua/kickstart.nvim.git
    dest: "{{ ['~' + macbook_user.stdout, '.config', 'nvim'] | path_join }}"
    clone: true
    update: false

- name: Create gh-dash config directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, '.config', 'gh-dash'] | path_join }}"
    state: directory

- name: Copy gh-dash config
  ansible.builtin.copy:
    src: gh-dash/config.yml
    dest: "{{ ['~' + macbook_user.stdout, '.config', 'gh-dash', 'config.yml'] | path_join }}"

- name: Copy darwin-specific zsh files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ['~' + macbook_user.stdout, '.zsh'] | path_join }}/"
  with_fileglob:
    - zsh/darwin/*.zsh

- name: Copy MCP functions
  ansible.builtin.copy:
    src: zsh/mcp.zsh
    dest: "{{ ['~' + macbook_user.stdout, '.zsh', 'mcp.zsh'] | path_join }}"

- name: create empty tokens file only if one doesnt already exist
  ansible.builtin.copy:
    content: ""
    dest: "{{ ['~' + macbook_user.stdout, '.zsh', 'tokens.zsh'] | path_join }}"
    force: no

- name: create trial file for new functions if one doesn't already exist
  ansible.builtin.copy:
    content: "tinker(){\n  echo try out new functions here, not in main file\n}"
    dest: "{{ ['~' + macbook_user.stdout, '.zsh', '_trialling.zsh'] | path_join }}"
    force: no

- name: copy js help file
  ansible.builtin.copy:
    src: help.js
    dest: "{{ ['~' + macbook_user.stdout, '.zsh', 'help.js'] | path_join }}"

- name: Add ansible to path.
  lineinfile:
    path: ~/.zshrc
    line: export PATH="/.pyvenv-ansible/bin:$PATH"

- name: Remove stale rails source line from zshrc
  lineinfile:
    path: ~/.zshrc
    line: source $HOME/.zsh/rails.zsh
    state: absent

- name: import dnsmasq.yml
  import_tasks: dnsmasq.yml
  when: inventory_hostname != 'github-runner.localhost'

- name: Copy dns functions
  ansible.builtin.copy:
    src: zsh/dns.zsh
    dest: "{{ ['~' + macbook_user.stdout, '.zsh', 'dns.zsh'] | path_join }}"

- name: Create videos directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, 'videos'] | path_join }}"
    state: directory

- name: Create videos transcripts directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, 'videos', 'transcripts'] | path_join }}"
    state: directory

- name: Create videos memory directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, 'videos', 'memory'] | path_join }}"
    state: directory

- name: Seed videos CLAUDE.md if not exists
  ansible.builtin.copy:
    src: videos/MEMORY.md
    dest: "{{ ['~' + macbook_user.stdout, 'videos', 'CLAUDE.md'] | path_join }}"
    force: no

- name: Seed videos scores.md if not exists
  ansible.builtin.copy:
    src: videos/scores.md
    dest: "{{ ['~' + macbook_user.stdout, 'videos', 'scores.md'] | path_join }}"
    force: no

- name: Seed videos memory if not exists
  ansible.builtin.copy:
    src: videos/MEMORY.md
    dest: "{{ ['~' + macbook_user.stdout, 'videos', 'memory', 'MEMORY.md'] | path_join }}"
    force: no

- name: Makes zsh the cron shell
  ansible.builtin.cron:
    name: SHELL
    env: yes
    job: /bin/zsh

- name: Setup cron for appcount
  ansible.builtin.cron:
    name: apps cron
    hour: "16"
    minute: "31"
    job: ". $HOME/.zshrc; apps cron"

- name: Setup cron for orb reset
  ansible.builtin.cron:
    name: orb reset cron
    weekday: "6"
    hour: "7"
    minute: "0"
    job: ". $HOME/.zshrc; orb reset"

- name: Setup cron for claudit skills audit
  ansible.builtin.cron:
    name: claudit cron
    hour: "3"
    minute: "0"
    job: "python3 $HOME/.claude/claudit.py"
