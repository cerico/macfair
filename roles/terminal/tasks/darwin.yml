---
- name: Check for per-user vars
  ansible.builtin.stat:
    path: "{{ [playbook_dir, 'host_vars', inventory_hostname, macbook_user.stdout + '.yml'] | path_join }}"
  register: per_user_vars

- name: Load per-user vars
  ansible.builtin.include_vars:
    file: "{{ per_user_vars.stat.path }}"
  when: per_user_vars.stat.exists

- name: Copy WezTerm config
  ansible.builtin.copy:
    src: wezterm.lua
    dest: "{{ ['~' + macbook_user.stdout, '.wezterm.lua'] | path_join }}"

- name: Cloning oh-my-zsh
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh
    dest: "{{ ['~' + macbook_user.stdout, '.oh-my-zsh'] | path_join }}"
    update: no

- name: Copy zsh theme
  copy:
    src: cerico.zsh-theme
    dest: "{{ ['~' + macbook_user.stdout, '.oh-my-zsh', 'themes', 'cerico.zsh-theme'] | path_join }}"

- name: Copy zsh theme ii
  copy:
    src: cerico-w-user.zsh-theme
    dest: "{{ ['~' + macbook_user.stdout, '.oh-my-zsh', 'themes', 'cerico-w-user.zsh-theme'] | path_join }}"

- name: change user shell to zsh
  become: true
  become_user: root
  user:
    name: "{{ macbook_user.stdout }}"
    shell: /bin/zsh

- name: register iterm location
  stat:
    path: "{{ ['~' + macbook_user.stdout, 'Library', 'Application Support', 'iTerm2'] | path_join }}"
  register: iterm_path

- name: Create iterm preferences by opening
  shell: open -a iTerm
  when: iterm_path.stat.exists

- name: copy iterm profiles
  template:
    src: iterm.json.j2
    dest: "{{ ['~' + macbook_user.stdout, 'Library', 'Application Support', 'iTerm2', 'DynamicProfiles', 'iterm.json'] | path_join }}"
  when: iterm_path.stat.exists

- name: Create local bin directory
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, '.local', 'bin'] | path_join }}"
    state: directory
    mode: "0755"

- name: Unload SpaceNumber LaunchAgent
  ansible.builtin.shell: >
    launchctl bootout gui/$(id -u) /Users/{{ macbook_user.stdout }}/Library/LaunchAgents/com.macfair.spacenumber.plist 2>/dev/null
  changed_when: false
  failed_when: false

- name: Remove SpaceNumber LaunchAgent
  ansible.builtin.file:
    path: "{{ ['~' + macbook_user.stdout, 'Library', 'LaunchAgents', 'com.macfair.spacenumber.plist'] | path_join }}"
    state: absent

- name: Remove SpaceNumber binary
  ansible.builtin.file:
    path: "/Users/{{ macbook_user.stdout }}/.local/bin/SpaceNumber"
    state: absent

- name: Manage DesktopMapping
  when: desktop_mapping is defined
  block:
    - name: Create .config directory
      ansible.builtin.file:
        path: "{{ ['~' + macbook_user.stdout, '.config'] | path_join }}"
        state: directory
        mode: "0755"

    - name: Deploy desktops.yml
      ansible.builtin.template:
        src: desktops.yml.j2
        dest: "{{ ['~' + macbook_user.stdout, '.config', 'desktops.yml'] | path_join }}"

    - name: Create DesktopMapping app bundle
      ansible.builtin.file:
        path: "/Users/{{ macbook_user.stdout }}/.local/bin/DesktopMapping.app/Contents/MacOS"
        state: directory
        mode: "0755"

    - name: Compile DesktopMapping menu bar app
      ansible.builtin.shell: >
        swiftc -framework Cocoa
        {{ playbook_dir }}/files/desktopmapping/DesktopMapping.swift
        -o /Users/{{ macbook_user.stdout }}/.local/bin/DesktopMapping.app/Contents/MacOS/DesktopMapping
      changed_when: true

    - name: Install DesktopMapping Info.plist
      ansible.builtin.copy:
        dest: "/Users/{{ macbook_user.stdout }}/.local/bin/DesktopMapping.app/Contents/Info.plist"
        mode: "0644"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.macfair.desktopmapping</string>
            <key>CFBundleName</key>
            <string>DesktopMapping</string>
            <key>CFBundleExecutable</key>
            <string>DesktopMapping</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>

    - name: Install DesktopMapping LaunchAgent
      ansible.builtin.copy:
        dest: "{{ ['~' + macbook_user.stdout, 'Library', 'LaunchAgents', 'com.macfair.desktopmapping.plist'] | path_join }}"
        mode: "0644"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>com.macfair.desktopmapping</string>
            <key>ProgramArguments</key>
            <array>
              <string>/usr/bin/open</string>
              <string>-W</string>
              <string>/Users/{{ macbook_user.stdout }}/.local/bin/DesktopMapping.app</string>
            </array>
            <key>RunAtLoad</key>
            <true/>
            <key>KeepAlive</key>
            <true/>
          </dict>
          </plist>

    - name: Load DesktopMapping LaunchAgent
      ansible.builtin.shell: >
        launchctl bootout gui/$(id -u) /Users/{{ macbook_user.stdout }}/Library/LaunchAgents/com.macfair.desktopmapping.plist 2>/dev/null;
        launchctl bootstrap gui/$(id -u) /Users/{{ macbook_user.stdout }}/Library/LaunchAgents/com.macfair.desktopmapping.plist
      changed_when: false

- name: Create pnpm-audit directory
  file:
    path: "{{ [ansible_env.HOME, 'work', 'crons', 'pnpm-audit'] | path_join }}"
    state: directory
    mode: "0755"

- name: Copy pnpm-audit script
  copy:
    src: pnpm-audit/daily-pnpm-audit.sh
    dest: "{{ [ansible_env.HOME, 'work', 'crons', 'pnpm-audit', 'daily-pnpm-audit.sh'] | path_join }}"
    mode: "0755"

- name: Create permissions-alert directory
  file:
    path: "{{ [ansible_env.HOME, 'work', 'crons', 'permissions-alert'] | path_join }}"
    state: directory
    mode: "0755"

- name: Copy permissions-alert script
  copy:
    src: permissions-alert/check_permissions.sh
    dest: "{{ [ansible_env.HOME, 'work', 'crons', 'permissions-alert', 'check_permissions.sh'] | path_join }}"
    mode: "0755"

- name: Setup permissions-alert cron (Tue/Fri at 09:00)
  ansible.builtin.cron:
    name: permissions alert
    minute: "0"
    hour: "9"
    weekday: "2,5"
    job: ". $HOME/.zshrc && {{ ansible_env.HOME }}/work/crons/permissions-alert/check_permissions.sh"

- name: Create version-alert directory
  file:
    path: "{{ [ansible_env.HOME, 'work', 'crons', 'version-alert'] | path_join }}"
    state: directory
    mode: "0755"

- name: Copy version-alert script
  copy:
    src: version-alert/check_versions.sh
    dest: "{{ [ansible_env.HOME, 'work', 'crons', 'version-alert', 'check_versions.sh'] | path_join }}"
    mode: "0755"

- name: Setup version-alert cron (daily at 10:00)
  ansible.builtin.cron:
    name: version alert
    minute: "0"
    hour: "10"
    job: ". $HOME/.zshrc && {{ ansible_env.HOME }}/work/crons/version-alert/check_versions.sh"
