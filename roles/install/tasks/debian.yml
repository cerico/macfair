---
- name: install docker for hosts tagged with docker
  import_tasks: docker.yml
  become: true
  become_user: root
  when: hostvars[inventory_hostname].optional is defined and "docker" in hostvars[inventory_hostname].optional

- name: "roles/apt-task/tasks/main Add GitHub CLI gpg key"
  shell: curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg --yes
  become: true

- name: "roles/apt-task/tasks/main Set up the stable repository for GitHub CLI"
  shell: echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
  become: true

- name: remove apache
  apt:
    name:
      - apache2
    state: absent
  become: true
  become_user: root

- name: apt update
  apt:
    update_cache: yes
    upgrade: yes
  become: true
  become_user: root
  ignore_errors: true

- name: install apt packages
  apt:
    name:
      - git
      - gh
      - jq
      - nginx
      - python3-pip
      - python3-setuptools
      - snapd
      - figlet
      - ufw
      - fail2ban
    state: present
  become: true
  become_user: root

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  become: true

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  become: true

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  become: true

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp
  become: true

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: true

- name: Check if SSH authorized_keys exist for deploy user
  stat:
    path: "{{ ['/home', ansible_user, '.ssh', 'authorized_keys'] | path_join }}"
  register: ssh_keys_deployed

- name: Fail if SSH keys not deployed
  fail:
    msg: "SSH keys not found for {{ ansible_user }} on {{ inventory_hostname }}. Run make keys first."
  when: not (ssh_keys_deployed.stat.exists and ssh_keys_deployed.stat.size > 0)

- name: Harden SSH configuration
  copy:
    content: |
      PasswordAuthentication no
      PermitRootLogin no
      MaxAuthTries 3
      LoginGraceTime 30
      AllowAgentForwarding no
      MaxSessions 2
    dest: /etc/ssh/sshd_config.d/10-ssh-hardening.conf
    mode: '0644'
  become: true
  notify: Restart sshd

- name: Validate SSH configuration before restart
  command: sshd -t
  become: true
  changed_when: false

- name: Remove bootstrap and legacy sshd configs
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/sshd_config.d/00-bootstrap-password-auth.conf
    - /etc/ssh/sshd_config.d/10-disable-password-login.conf
    - /etc/ssh/sshd_config.d/20-disable-root-login.conf
  become: true
  notify: Restart sshd

- name: Deploy fail2ban SSH jail config
  copy:
    content: |
      [sshd]
      enabled = true
      port = ssh
      maxretry = 5
      bantime = 3600
      findtime = 600
    dest: /etc/fail2ban/jail.d/sshd.conf
    mode: '0644'
  become: true
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  become: true

- name: install vscode
  apt:
    name:
      - code
    state: present
  become: true
  become_user: root
  ignore_errors: true

- name: Remove apt-installed nodejs to avoid conflict with snap
  apt:
    name:
      - nodejs
      - npm
    state: absent
  become: true
  become_user: root

- name: snap core
  command: snap install core
  become: true
  become_user: root

- name: Install nodejs via snap
  command: snap install node --classic --channel=22
  become: true
  become_user: root
  ignore_errors: true

- name: Refresh nodejs snap to channel 22
  command: snap refresh node --classic --channel=22
  become: true
  become_user: root
  ignore_errors: true

- name: Install certbot via apt (Debian)
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  become: true
  become_user: root
  when: ansible_distribution == "Debian"

- name: Install certbot snap with option --classic (Ubuntu)
  command: snap install certbot --classic
  become: true
  become_user: root
  when: ansible_distribution == "Ubuntu"

- name: create certbot cron file if it doesnt exist (Ubuntu)
  copy:
    content: ""
    dest: /etc/cron.d/cert
    force: no
  become: true
  become_user: root
  when: ansible_distribution == "Ubuntu"

- name: Add certbot renewals to cron (Ubuntu)
  lineinfile:
    path: /etc/cron.d/cert
    line: 5 4 * * 2 root /snap/bin/certbot renew
    insertbefore: BOF
  become: true
  become_user: root
  when: ansible_distribution == "Ubuntu"

- name: Enable certbot.timer (Debian)
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  become: true
  become_user: root
  when: ansible_distribution == "Debian"

- name: pip installs
  pip:
    name: "{{ item }}"
    extra_args: --break-system-packages
  with_items:
    - "jmespath"
    - "passlib"
    - "yq"

- name: Replace a localhost entry searching for a literal string to avoid escaping
  become: true
  become_user: root
  ansible.builtin.lineinfile:
    path: /etc/hosts
    search_string: "127.0.0.1"
    line: 127.0.0.1 {{ inventory_hostname }}
    owner: root
    group: root
    mode: "0644"

- name: Replace a localhost entry in cloud-init template
  become: true
  become_user: root
  ansible.builtin.lineinfile:
    path: /etc/cloud/templates/hosts.debian.tmpl
    search_string: "127.0.0.1"
    line: 127.0.0.1 {{ inventory_hostname }}
    owner: root
    group: root
    mode: "0644"
  ignore_errors: true

- name: Set a hostname
  become: true
  become_user: root
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
