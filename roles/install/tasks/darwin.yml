---
- name: install core packages
  become: true
  become_user: "{{ brew_user.stdout }}"
  homebrew:
    name: "{{ brew_core_packages + ['ffmpeg'] }}"
    state: present
  when: ansible_distribution_version is version('13.0', '>=')
  vars:
    brew_core_packages: &core_packages
      - "yt-dlp"
      - "gh"
      - "jq"
      - "wget"
      - "dnsmasq"
      - "gcc"
      - "openssl"
      - "cmake"
      - "git"
      - "moreutils"
      - "findutils"
      - "gnupg"
      - "grep"
      - "screen"
      - "pigz"
      - "tree"
      - "shared-mime-info"
      - "nginx"
      - "graphviz"
      - "node@{{ node_version }}"
      - "pnpm"
      - "bun"
      - "zsh"
      - "zsh-completions"
      - "zsh-autosuggestions"
      - "zsh-syntax-highlighting"
      - "direnv"
      - "watch"
      - "nmap"
      - "htop"
      - "neovim"
      - "postgresql"
      - "redis"
      - "lima"
      - "glow"
      - "n"
      - "repomix"
      - "autossh"
      - "act"
      - "dopplerhq/cli/doppler"
      - "stripe/stripe-cli/stripe"
      - "wireguard-tools"
      - "python"
      - "ripgrep"
      - "neonctl"
      - "uv"
      - "semgrep"
      - "shellcheck"
      - "librsvg"
      - "marcus/tap/nightshift"
      - "marcus/tap/td"
      - "marcus/tap/sidecar"

- name: install core packages (best effort, older macOS)
  become: true
  become_user: "{{ brew_user.stdout }}"
  homebrew:
    name: "{{ brew_core_packages }}"
    state: present
  when: ansible_distribution_version is version('13.0', '<')
  ignore_errors: true
  vars:
    brew_core_packages: *core_packages

- name: install packages requiring macOS 11+
  become: true
  become_user: "{{ brew_user.stdout }}"
  homebrew:
    name:
      - "git-lfs"
    state: present
  when: ansible_distribution_version is version('11.0', '>=')

- name: Create directory for installed caskapps
  file:
    path: "{{ ['~' + brew_user.stdout, 'Applications'] | path_join }}"
    state: directory
    mode: 0775

- name: install cask apps
  become: true
  become_user: "{{ brew_user.stdout }}"
  homebrew_cask:
    name: "{{ item }}"
    state: present
  with_items:
    - "vlc"
    - "firefox"
    - "alfred"
    - "iterm2"
    - "vagrant"
    - "vagrant-manager"
    - "virtualbox"
    - "tunnelblick"
    - "slack"
    - "visual-studio-code"
    - "brave-browser"
    - "google-chrome"
    - "chromium"
    - "rar"
    - "karabiner-elements"
    - "opensuperwhisper"
    - "steipete/tap/repobar"
    - "tableplus"
    - "postico"
    - "hamed-elfayome/claude-usage/claude-usage-tracker"
    - "stats"
    - "wezterm"

- name: Copy zshenv
  copy:
    src: zshenv
    dest: "{{ ['~' + macbook_user.stdout, '.zshenv'] | path_join }}"

- name: source zshenv so we get /usr/local/bin for npm
  shell: source ~/.zshenv

- name: Install npm packages
  npm:
    name: "{{ item }}"
    global: yes
  with_items:
    - "vercel"
    - "netlify-cli"
    - "railway"
    - "ts-node"
    - "typescript"
    - "browser-sync"
    - "surge"
    - "agent-browser"
    - "linearctl"

- name: pip installs
  pip:
    name: "{{ item }}"
  with_items:
    - "jmespath"
    - "passlib"
    - "yq"
    - "trafilatura"

- name: Check if Claude Code is installed
  stat:
    path: "{{ ['~' + macbook_user.stdout, '.local', 'bin', 'claude'] | path_join }}"
  register: claude_installed

- name: Install Claude Code
  shell: curl -fsSL https://claude.ai/install.sh | bash
  when: not claude_installed.stat.exists

- name: link node
  shell: "{{ brew_location.stdout }} link --overwrite node@{{ node_version }}"
