---
- hosts: localhost
  connection: local
  vars:
    default_key: '~/.ssh/id_rsa.pub'
  tasks:
    - debug:
        var: users
    - name: Set up ssh key login for user
      shell: "ssh-copy-id -i {{ item.userkey | default(default_key) }} {{ item.username }}"
      with_items: "{{ users }}"

- hosts: debian
  tasks:
    - debug:
        var: hostvars['localhost']['users']

    - name: Ensure password auth is enabled for initial key bootstrap
      copy:
        content: "PasswordAuthentication yes\n"
        dest: /etc/ssh/sshd_config.d/00-bootstrap-password-auth.conf
        force: no
        mode: '0644'
      become: true
      become_user: root
