name: Test
on:
  push:
    branches-ignore:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python3 -m venv ~/.pyvenv-ansible
          source ~/.pyvenv-ansible/bin/activate
          pip install ansible

      - name: Create dummy vault password and secrets for CI
        run: |
          echo "dummy" > ~/.vault_pass
          cat > group_vars/all/vault.yml << 'EOF'
          vault_github_token: dummy
          vault_linear_api_key: dummy
          vault_linear_webhook_secret: dummy
          vault_cyrus_auth_token: dummy
          EOF

      - name: Install ansible requirements
        run: |
          source ~/.pyvenv-ansible/bin/activate
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax-check all playbooks
        run: |
          source ~/.pyvenv-ansible/bin/activate
          make verify

      - name: Replace tracked files with CI-safe versions
        run: |
          printf '[macbook]\n\n[debian]\n\n[sites]\n' > hosts
          printf 'users:\nroot:\n' > host_vars/localhost.yml

      - name: runs the newcomputer target with vars to bypass prompt
        run: |
          source ~/.pyvenv-ansible/bin/activate
          ansible-playbook newcomputer.yml -i hosts -e "target=dox.io37.ch" -e "user=deploy" -e "group=debian"

      - name: use http version of sites repo just for gh action so as not to bother w keys
        run: |
          echo 'nginx_repo: "https://github.com/cerico/nginx-files.git"' >> host_vars/localhost.yml

      - name: Run the newsite target with vars to bypass prompt
        run: |
          source ~/.pyvenv-ansible/bin/activate
          ansible-playbook newsite.yml -i hosts -e "app_name=yes.mate"

      - name: Is new entry in sites/Makefile
        run: cd ../sites && make

  integration:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Syntax-check ZSH files
        run: |
          failed=0
          for f in files/zsh/*.zsh files/bin/*; do
            [[ -f "$f" ]] || continue
            if ! zsh -n "$f" 2>&1; then
              echo "FAIL: $f"
              failed=1
            fi
          done
          exit $failed
        shell: zsh {0}

      - name: Syntax-check shell scripts
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find files -name '*.sh' -type f -print0)
          exit $failed

      - name: Validate JSON files
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "FAIL: $f"
              python3 -m json.tool "$f" 2>&1 || true
              failed=1
            fi
          done < <(find files -name '*.json' -type f -print0)
          exit $failed

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python3 -m venv ~/.pyvenv-ansible
          source ~/.pyvenv-ansible/bin/activate
          pip install ansible

      - name: Create dummy vault password and secrets for CI
        run: |
          echo "dummy" > ~/.vault_pass
          cat > group_vars/all/vault.yml << 'EOF'
          vault_github_token: dummy
          vault_linear_api_key: dummy
          vault_linear_webhook_secret: dummy
          vault_cyrus_auth_token: dummy
          EOF

      - name: Install ansible requirements
        run: |
          source ~/.pyvenv-ansible/bin/activate
          ansible-galaxy collection install -r requirements.yml

      - name: Replace tracked files with CI-safe versions
        run: |
          printf '[macbook]\n\n[debian]\n\n[sites]\n' > hosts
          printf 'users:\nroot:\n' > host_vars/localhost.yml

      - name: makes this target
        run: |
          source ~/.pyvenv-ansible/bin/activate
          ansible-playbook thiscomputer.yml -i hosts -e "hostname=github-runner"

      - name: Runs the debug target
        run: |
          source ~/.pyvenv-ansible/bin/activate
          make debug

      - name: runs the terminal target
        run: |
          source ~/.pyvenv-ansible/bin/activate
          make terminal

      - name: runs the functions target
        run: |
          source ~/.pyvenv-ansible/bin/activate
          make functions

      - name: cat zshrc
        run: cat ~/.macfair/version

      - name: source zshrc & run main functions
        run: source ~/.zshrc && run_all_functions
        shell: zsh {0}
